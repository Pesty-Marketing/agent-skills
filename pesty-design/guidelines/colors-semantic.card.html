<!-- @dsCard group="Colors" viewport="700x170" name="Semantic & Status" subtitle="Success (wins), warning, and danger — used sparingly" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; }
  .chip { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .top { height: 64px; display: flex; align-items: center; padding: 0 14px; color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 14px; }
  .bot { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-body); }
  .dot { width: 10px; height: 10px; border-radius: 99px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }
</style>
</head>
<body>
  <div class="row">
    <div class="chip">
      <div class="top" style="background:var(--success)">Success</div>
      <div class="bot"><span class="dot" style="background:var(--success-bg)"></span>+30% YoY growth<span class="hex">#1F8A5B</span></div>
    </div>
    <div class="chip">
      <div class="top" style="background:var(--warning); color:var(--ink-900)">Warning</div>
      <div class="bot"><span class="dot" style="background:var(--warning-bg)"></span>Needs attention<span class="hex">#E8A317</span></div>
    </div>
    <div class="chip">
      <div class="top" style="background:var(--danger)">Danger</div>
      <div class="bot"><span class="dot" style="background:var(--danger-bg)"></span>Errors, alerts<span class="hex">#D90429</span></div>
    </div>
  </div>
</body>
</html>
