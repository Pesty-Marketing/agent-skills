<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & Shadow" subtitle="Soft ink-tinted shadows + the red CTA glow" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-subtle); padding: 30px 28px; font-family: var(--font-body); }
  .row { display: flex; gap: 22px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; }
  .box { width: 100%; height: 72px; background: var(--n-0); border-radius: var(--radius-lg); }
  .glow { background: var(--red-500); }
  .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lab">xl</span></div>
    <div class="item"><div class="box glow" style="box-shadow:var(--shadow-brand)"></div><span class="lab">brand glow</span></div>
  </div>
</body>
</html>
