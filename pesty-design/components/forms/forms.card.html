<!-- @dsCard group="Components" viewport="700x360" name="Form Fields" subtitle="Input, Select, Textarea & Checkbox with red focus ring" -->
<!--
  Self-contained specimen: INLINES the components below (no dependency on the
  upstream _ds_bundle.js), so it renders in every context. The inlined
  definitions mirror the canonical sources under ../../components/{forms,core}/
  — edit those for the library; this card is a runnable specimen.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 28px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; align-items: start; }
  .span { grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    /* ---- Icon (mirror of components/core/Icon.jsx) ---- */
    const PATHS = {
      check: <path d="M20 6 9 17l-5-5" />,
      phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
      'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
      'chevron-down': <path d="m6 9 6 6 6-6" />,
    };
    function Icon({ name, size = 20, strokeWidth = 2, className, style, ...rest }) {
      const filled = name === 'star';
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
          fill={filled ? 'currentColor' : 'none'} stroke={filled ? 'none' : 'currentColor'}
          strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
          className={className} style={{ display: 'block', flexShrink: 0, ...style }} aria-hidden="true" {...rest}>
          {PATHS[name] || null}
        </svg>
      );
    }

    /* ---- Field CSS (mirror of components/forms/Input.jsx; shared by Input/Select/Textarea) ---- */
    const FIELD_CSS = `
    .pesty-field { display: flex; flex-direction: column; gap: 7px; }
    .pesty-field__label { font-family: var(--font-display); font-weight: var(--fw-semibold); font-size: var(--text-sm); color: var(--text-strong); }
    .pesty-field__hint { font-size: var(--text-xs); color: var(--text-muted); }
    .pesty-field__hint--error { color: var(--danger); }
    .pesty-inputwrap { position: relative; display: flex; align-items: center; }
    .pesty-inputwrap > svg { position: absolute; left: 14px; color: var(--text-faint); pointer-events: none; }
    .pesty-input {
      width: 100%; font-family: var(--font-body); font-size: var(--text-base);
      color: var(--text-strong); background: var(--n-0);
      border: 1.5px solid var(--border-strong); border-radius: var(--radius-md);
      padding: 12px 14px; line-height: 1.4;
      transition: border-color var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard);
    }
    .pesty-input::placeholder { color: var(--text-faint); }
    .pesty-input.has-icon { padding-left: 42px; }
    .pesty-input:hover:not(:disabled) { border-color: var(--n-400); }
    .pesty-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); }
    .pesty-input:disabled { background: var(--n-50); color: var(--text-muted); cursor: not-allowed; }
    .pesty-input--error { border-color: var(--danger); }
    .pesty-input--error:focus { box-shadow: 0 0 0 3px var(--focus-ring); }
    textarea.pesty-input { resize: vertical; min-height: 96px; }
    `;
    if (typeof document !== 'undefined' && !document.getElementById('pesty-field-css')) {
      const s = document.createElement('style'); s.id = 'pesty-field-css'; s.textContent = FIELD_CSS; document.head.appendChild(s);
    }

    /* ---- Input ---- */
    function Input({ label, hint, error, icon, id, className = '', ...rest }) {
      const fieldId = id || (label ? `f-${label.replace(/\s+/g, '-').toLowerCase()}` : undefined);
      return (
        <div className="pesty-field">
          {label && <label className="pesty-field__label" htmlFor={fieldId}>{label}</label>}
          <div className="pesty-inputwrap">
            {icon && <Icon name={icon} size={18} />}
            <input id={fieldId} className={`pesty-input ${icon ? 'has-icon' : ''} ${error ? 'pesty-input--error' : ''} ${className}`} {...rest} />
          </div>
          {(hint || error) && <span className={`pesty-field__hint ${error ? 'pesty-field__hint--error' : ''}`}>{error || hint}</span>}
        </div>
      );
    }

    /* ---- Select ---- */
    function Select({ label, hint, error, id, children, className = '', ...rest }) {
      const fieldId = id || (label ? `s-${label.replace(/\s+/g, '-').toLowerCase()}` : undefined);
      return (
        <div className="pesty-field">
          {label && <label className="pesty-field__label" htmlFor={fieldId}>{label}</label>}
          <div className="pesty-inputwrap">
            <select id={fieldId} className={`pesty-input ${error ? 'pesty-input--error' : ''} ${className}`} style={{ appearance: 'none', paddingRight: '42px', cursor: 'pointer' }} {...rest}>
              {children}
            </select>
            <Icon name="chevron-down" size={18} style={{ position: 'absolute', right: '14px', left: 'auto', color: 'var(--text-muted)', pointerEvents: 'none' }} />
          </div>
          {(hint || error) && <span className={`pesty-field__hint ${error ? 'pesty-field__hint--error' : ''}`}>{error || hint}</span>}
        </div>
      );
    }

    /* ---- Textarea ---- */
    function Textarea({ label, hint, error, id, className = '', rows = 4, ...rest }) {
      const fieldId = id || (label ? `t-${label.replace(/\s+/g, '-').toLowerCase()}` : undefined);
      return (
        <div className="pesty-field">
          {label && <label className="pesty-field__label" htmlFor={fieldId}>{label}</label>}
          <textarea id={fieldId} rows={rows} className={`pesty-input ${error ? 'pesty-input--error' : ''} ${className}`} {...rest} />
          {(hint || error) && <span className={`pesty-field__hint ${error ? 'pesty-field__hint--error' : ''}`}>{error || hint}</span>}
        </div>
      );
    }

    /* ---- Checkbox (mirror of components/forms/Checkbox.jsx) ---- */
    const CHECK_CSS = `
    .pesty-check { display: inline-flex; align-items: flex-start; gap: 11px; cursor: pointer; font-family: var(--font-body); font-size: var(--text-base); color: var(--text-body); }
    .pesty-check input { position: absolute; opacity: 0; width: 0; height: 0; }
    .pesty-check__box {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
      border: 1.5px solid var(--border-strong); background: var(--n-0);
      display: inline-flex; align-items: center; justify-content: center; margin-top: 1px;
      color: #fff; transition: all var(--dur-base) var(--ease-standard);
    }
    .pesty-check__box > svg { opacity: 0; transform: scale(0.6); transition: all var(--dur-fast) var(--ease-standard); }
    .pesty-check input:checked + .pesty-check__box { background: var(--brand); border-color: var(--brand); }
    .pesty-check input:checked + .pesty-check__box > svg { opacity: 1; transform: scale(1); }
    .pesty-check input:focus-visible + .pesty-check__box { box-shadow: 0 0 0 3px var(--focus-ring); }
    .pesty-check:hover input:not(:checked) + .pesty-check__box { border-color: var(--n-400); }
    `;
    if (typeof document !== 'undefined' && !document.getElementById('pesty-check-css')) {
      const s = document.createElement('style'); s.id = 'pesty-check-css'; s.textContent = CHECK_CSS; document.head.appendChild(s);
    }
    function Checkbox({ label, className = '', ...rest }) {
      return (
        <label className={`pesty-check ${className}`}>
          <input type="checkbox" {...rest} />
          <span className="pesty-check__box"><Icon name="check" size={15} strokeWidth={3} /></span>
          {label && <span>{label}</span>}
        </label>
      );
    }

    /* ---- Demo ---- */
    function Demo() {
      return (
        <div className="grid">
          <Input label="City" icon="map-pin" placeholder="Where do you operate?" defaultValue="Austin, TX" />
          <Select label="Monthly revenue" defaultValue="$5M – $20M">
            <option>$1M – $5M</option>
            <option>$5M – $20M</option>
            <option>$20M+</option>
          </Select>
          <Input className="" label="Business email" type="email" placeholder="you@company.com" error="Enter a valid work email" />
          <Input label="Phone" icon="phone" placeholder="(855) 624-0247" />
          <div className="span"><Textarea label="What are your growth goals?" rows={2} placeholder="e.g. 30% YoY, reduce ad spend reliance…" /></div>
          <div className="span"><Checkbox label="Send me the pest control marketing newsletter" defaultChecked /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
