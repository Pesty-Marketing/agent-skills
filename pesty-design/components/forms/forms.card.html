<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 28px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; align-items: start; }
  .span { grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, Textarea, Checkbox } = window.PestyMarketingDesignSystem_3e0158;
    function Demo() {
      return (
        <div className="grid">
          <Input label="City" icon="map-pin" placeholder="Where do you operate?" defaultValue="Austin, TX" />
          <Select label="Monthly revenue" defaultValue="$5M – $20M">
            <option>$1M – $5M</option>
            <option>$5M – $20M</option>
            <option>$20M+</option>
          </Select>
          <Input className="" label="Business email" type="email" placeholder="you@company.com" error="Enter a valid work email" />
          <Input label="Phone" icon="phone" placeholder="(855) 624-0247" />
          <div className="span"><Textarea label="What are your growth goals?" rows={2} placeholder="e.g. 30% YoY, reduce ad spend reliance…" /></div>
          <div className="span"><Checkbox label="Send me the pest control marketing newsletter" defaultChecked /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
