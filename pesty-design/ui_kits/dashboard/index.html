<!--
  Pesty Marketing — Dashboard UI kit (self-contained).
  Renders and deploys as-is: links ../../styles.css for tokens, loads React +
  Babel from unpkg, and INLINES the dashboard components below (no dependency
  on the upstream _ds_bundle.js). This mirrors the canonical sources under
  ../../components/{data,feedback,nav,forms,surfaces,layout}/ — edit those for
  the library; this file is the runnable showcase + migration exemplar.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pesty — Dashboard UI kit</title>
<link rel="icon" href="../../assets/brand/pesty-mark.svg">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-subtle); font-family: var(--font-body); color: var(--text-body); }

  /* Button */
  .pesty-btn {
    --_bg: var(--brand); --_fg: var(--text-on-brand); --_bd: transparent;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5em;
    font-family: var(--font-display); font-weight: var(--fw-semibold);
    border: 1.5px solid var(--_bd); background: var(--_bg); color: var(--_fg);
    border-radius: var(--radius-pill); cursor: pointer; white-space: nowrap; line-height: 1; letter-spacing: -0.01em;
    transition: background var(--dur-base) var(--ease-standard), border-color var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard), transform var(--dur-fast) var(--ease-standard);
  }
  .pesty-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .pesty-btn:active { transform: translateY(1px); }
  .pesty-btn--sm { font-size: var(--text-sm); padding: 8px 16px; }
  .pesty-btn--md { font-size: var(--text-base); padding: 12px 22px; }
  .pesty-btn--outline { --_bg: transparent; --_fg: var(--ink-900); --_bd: var(--border-strong); }
  .pesty-btn--outline:hover { --_bd: var(--ink-900); --_bg: var(--n-50); }
  .pesty-btn--primary:hover { --_bg: var(--brand-hover); box-shadow: var(--shadow-brand); }

  /* Input */
  .pesty-inputwrap { position: relative; display: flex; align-items: center; width: 100%; }
  .pesty-inputwrap > svg { position: absolute; left: 12px; color: var(--text-faint); pointer-events: none; }
  .pesty-input {
    width: 100%; font-family: var(--font-body); font-size: var(--text-sm); color: var(--text-strong);
    background: var(--n-0); border: 1.5px solid var(--border-strong); border-radius: var(--radius-md);
    padding: 9px 12px; line-height: 1.4;
    transition: border-color var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard);
  }
  .pesty-input::placeholder { color: var(--text-faint); }
  .pesty-input.has-icon { padding-left: 38px; }
  .pesty-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); }

  /* DataTable */
  .pesty-dt { width: 100%; border-collapse: collapse; font-family: var(--font-body); color: var(--text-body); }
  .pesty-dt th {
    font-family: var(--font-mono); font-size: var(--text-2xs); font-weight: var(--fw-medium);
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--n-600);
    text-align: left; padding: 0 var(--cell-pad-x); height: 40px;
    background: var(--table-header-bg); border-bottom: 1px solid var(--border-strong); white-space: nowrap; user-select: none;
  }
  .pesty-dt th.num { text-align: right; }
  .pesty-dt th.sortable { cursor: pointer; }
  .pesty-dt th.sortable:hover { color: var(--text-strong); }
  .pesty-dt__sort { display: inline-flex; align-items: center; gap: 6px; }
  .pesty-dt th.num .pesty-dt__sort { flex-direction: row-reverse; }
  .pesty-dt td { padding: 0 var(--cell-pad-x); height: var(--pesty-dt-row, 48px); font-size: var(--text-sm); color: var(--text-body); vertical-align: middle; }
  .pesty-dt td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pesty-dt td.strong { color: var(--text-strong); font-weight: var(--fw-medium); }
  .pesty-dt__sub { display: block; font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; font-weight: var(--fw-regular); }
  .pesty-dt tbody tr { transition: background var(--dur-fast) var(--ease-standard); }
  .pesty-dt tbody tr:hover { background: var(--table-row-hover); }
  .pesty-dt--horizontal td { border-bottom: 1px solid var(--divider); }
  .pesty-dt--grid td, .pesty-dt--grid th { border: 1px solid var(--divider); }
  .pesty-dt--grid th { border-bottom-color: var(--border-strong); }
  .pesty-dt--zebra tbody tr:nth-child(even) { background: var(--table-zebra); }
  .pesty-dt--zebra tbody tr:nth-child(even):hover { background: var(--table-row-hover); }
  .pesty-dt--sticky thead th { position: sticky; top: 0; z-index: 2; }

  /* Tabs */
  .pesty-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .pesty-tab {
    appearance: none; background: none; border: none; cursor: pointer;
    font-family: var(--font-display); font-weight: var(--fw-semibold); font-size: var(--text-sm);
    color: var(--text-muted); padding: 12px 24px; display: inline-flex; align-items: center; gap: 8px;
    border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
    transition: color var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard);
  }
  .pesty-tab:hover { color: var(--text-strong); }
  .pesty-tab[aria-selected="true"] { color: var(--brand); border-bottom-color: var(--brand); }
  .pesty-tab:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: -2px; border-radius: var(--radius-xs); }
  .pesty-tab__count { font-family: var(--font-mono); font-size: var(--text-2xs); line-height: 1; background: var(--n-100); color: var(--n-600); padding: 3px 7px; border-radius: var(--radius-pill); }
  .pesty-tab[aria-selected="true"] .pesty-tab__count { background: var(--brand-subtle); color: var(--brand-press); }

  /* Chip */
  .pesty-chip {
    appearance: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-body); font-weight: var(--fw-medium); font-size: var(--text-sm);
    color: var(--text-body); background: var(--n-0); border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-pill); padding: 6px 14px; line-height: 1;
    transition: background var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);
  }
  .pesty-chip:hover { border-color: var(--n-400); color: var(--text-strong); }
  .pesty-chip[aria-pressed="true"] { background: var(--brand-subtle); border-color: var(--brand); color: var(--brand-press); }
  .pesty-chip:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  .pesty-chip__x { display: inline-flex; margin: 0 -3px 0 1px; opacity: 0.6; }
  .pesty-chip__x:hover { opacity: 1; }

  /* Sidebar */
  .pesty-sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--ink-900); color: var(--text-on-dark-muted); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .pesty-sidebar__head { padding: 16px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-on-dark); min-height: var(--topbar-h); box-sizing: border-box; }
  .pesty-sidebar__nav { padding: 12px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .pesty-sidebar__group { font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-on-dark-faint); padding: 14px 12px 6px; }
  .pesty-navitem { appearance: none; background: none; border: none; cursor: pointer; width: 100%; text-align: left; display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); font-family: var(--font-body); font-weight: var(--fw-medium); font-size: var(--text-sm); color: var(--text-on-dark-muted); transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard); }
  .pesty-navitem:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .pesty-navitem:focus-visible { outline: 2px solid var(--focus-ring-dark); outline-offset: -2px; }
  .pesty-navitem[aria-current="page"] { background: var(--brand); color: #fff; }
  .pesty-navitem__count { margin-left: auto; font-family: var(--font-mono); font-size: var(--text-2xs); opacity: 0.75; }
  .pesty-subnav { display: flex; flex-direction: column; gap: 1px; margin: 1px 0 4px; padding-left: 16px; }
  .pesty-navitem--sub { padding: 7px 12px; color: var(--text-on-dark-faint); font-weight: var(--fw-regular); }
  .pesty-navitem--sub:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .pesty-navitem--sub[aria-current="page"] { background: rgba(217,4,41,0.20); color: #fff; }
  .pesty-sidebar__foot { padding: 14px 16px; border-top: 1px solid var(--border-on-dark); display: flex; align-items: center; gap: 10px; }

  /* CodeBlock */
  .pesty-code__label { font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 0 0 8px; }
  .pesty-code__panel { position: relative; background: var(--ink-900); border: 1px solid var(--ink-800); border-radius: var(--radius-md); overflow: hidden; }
  .pesty-code__pre { margin: 0; padding: 16px 18px; overflow-x: auto; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.65; color: rgba(255,255,255,0.90); }
  .pesty-code__pre .c { color: var(--teal-300); }
  .pesty-code__pre .k { color: var(--red-300); }
  .pesty-code__pre .s { color: #8FE3B5; }
  .pesty-code__copy { position: absolute; top: 8px; right: 8px; appearance: none; cursor: pointer; font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-on-dark-muted); background: rgba(255,255,255,0.08); border: 1px solid var(--border-on-dark); border-radius: var(--radius-sm); padding: 5px 10px; transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard); }
  .pesty-code__copy:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .pesty-code__copy:focus-visible { outline: 2px solid var(--focus-ring-dark); outline-offset: 2px; }

  /* SpecList */
  .pesty-spec { display: grid; grid-template-columns: repeat(auto-fit, minmax(var(--pesty-spec-min, 260px), 1fr)); gap: 14px 24px; margin: 0; }
  .pesty-spec__row { display: flex; flex-direction: column; gap: 3px; }
  .pesty-spec__key { font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .pesty-spec__val { margin: 0; font-family: var(--font-body); font-size: var(--text-sm); color: var(--text-body); line-height: 1.5; }
  .pesty-spec__val code { font-family: var(--font-mono); font-size: 0.92em; color: var(--text-strong); background: var(--n-100); padding: 1px 6px; border-radius: var(--radius-xs); }

  /* Pipeline */
  .pesty-pipeline { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .pesty-pipeline__step { background: var(--n-0); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 10px 14px; font-family: var(--font-body); font-weight: var(--fw-semibold); font-size: var(--text-sm); color: var(--text-strong); }
  .pesty-pipeline__arrow { color: var(--text-faint); display: inline-flex; }

  /* Gallery specimens strip */
  .specimens { padding: 40px var(--dash-gutter) 64px; max-width: var(--container-dashboard); margin: 0 auto; }
  .specimens h3 { font-family: var(--font-display); font-weight: var(--fw-extrabold); color: var(--text-strong); font-size: var(--text-xl); margin: 0 0 4px; }
  .specimens .ey { font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: 0.12em; color: var(--brand); }
  .spec-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 24px; }
  .spec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-xs); }
  .spec > .lbl { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); display: block; margin-bottom: 14px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useMemo } = React;

/* ---- Icon (mirror of components/core/Icon.jsx) ---- */
const ICON_PATHS = {
  'arrow-right': <><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></>,
  check: <path d="M20 6 9 17l-5-5" />,
  search: <><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>,
  x: <><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>,
  star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
  'chevron-down': <path d="m6 9 6 6 6-6" />,
  'chevron-up': <path d="m18 15-6-6-6 6" />,
  'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
  'trending-up': <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></>,
  'trending-down': <><polyline points="22 17 13.5 8.5 8.5 13.5 2 7" /><polyline points="16 17 22 17 22 11" /></>,
  home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
  'bar-chart': <><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></>,
  users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
  target: <><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>,
  zap: <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" />,
  filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />,
  bell: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></>,
};
function Icon({ name, size = 20, strokeWidth = 2, style, ...rest }) {
  const filled = name === 'star';
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
      fill={filled ? 'currentColor' : 'none'} stroke={filled ? 'none' : 'currentColor'}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={{ display: 'block', flexShrink: 0, ...style }} aria-hidden="true" {...rest}>
      {ICON_PATHS[name] || null}
    </svg>
  );
}

/* ---- Primitives (mirrors) ---- */
function Button({ children, variant = 'primary', size = 'md', iconLeft, className = '', ...rest }) {
  return (
    <button className={`pesty-btn pesty-btn--${variant} pesty-btn--${size} ${className}`} {...rest}>
      {iconLeft && <Icon name={iconLeft} size={16} />}{children}
    </button>
  );
}
function Avatar({ name, size = 36, ...rest }) {
  const initials = name ? name.split(' ').map((w) => w[0]).slice(0, 2).join('').toUpperCase() : '';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size,
      borderRadius: 'var(--radius-pill)', background: 'var(--ink-700)', color: '#fff', fontFamily: 'var(--font-display)',
      fontWeight: 'var(--fw-semibold)', fontSize: size * 0.36, flexShrink: 0 }} {...rest}>{initials}</span>
  );
}
function Input({ icon, className = '', ...rest }) {
  return (
    <div className="pesty-inputwrap">
      {icon && <Icon name={icon} size={16} />}
      <input className={`pesty-input ${icon ? 'has-icon' : ''} ${className}`} {...rest} />
    </div>
  );
}
function Card({ children, padding = 'lg', className = '', style = {}, ...rest }) {
  const pads = { none: 0, sm: 'var(--space-4)', md: 'var(--space-6)', lg: 'var(--space-8)' };
  return (
    <div className={`pesty-card ${className}`} style={{ background: 'var(--n-0)', border: '1px solid var(--border)',
      color: 'var(--text-body)', borderRadius: 'var(--radius-lg)', padding: pads[padding], boxShadow: 'var(--shadow-md)', ...style }} {...rest}>
      {children}
    </div>
  );
}
function Badge({ children, variant = 'neutral' }) {
  const v = { neutral: { background: 'var(--n-100)', color: 'var(--n-700)' }, soft: { background: 'var(--brand-subtle)', color: 'var(--brand-press)' } }[variant];
  return <span style={{ display: 'inline-flex', alignItems: 'center', fontFamily: 'var(--font-display)', fontWeight: 'var(--fw-semibold)', fontSize: '11px', padding: '3px 9px', borderRadius: 'var(--radius-pill)', lineHeight: 1, ...v }}>{children}</span>;
}

/* ---- StatusPill (mirror) ---- */
function StatusPill({ children, variant = 'neutral', dot = true }) {
  const variants = {
    success: { background: 'var(--success-bg)', color: 'var(--green-600)' },
    warning: { background: 'var(--warning-bg)', color: 'var(--amber-700)' },
    danger: { background: 'var(--danger-bg)', color: 'var(--red-700)' },
    info: { background: 'var(--teal-100)', color: 'var(--ink-700)' },
    neutral: { background: 'var(--n-100)', color: 'var(--n-700)' },
  };
  const v = variants[variant] || variants.neutral;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '5px', fontFamily: 'var(--font-mono)',
      fontWeight: 'var(--fw-medium)', fontSize: 'var(--text-2xs)', lineHeight: 1, textTransform: 'uppercase',
      letterSpacing: '0.06em', whiteSpace: 'nowrap', padding: '4px 9px', borderRadius: 'var(--radius-pill)', ...v }}>
      {dot && <span aria-hidden="true" style={{ width: 6, height: 6, borderRadius: '50%', background: 'currentColor', flexShrink: 0 }} />}
      {children}
    </span>
  );
}

/* ---- DeltaPill (mirror) ---- */
function DeltaPill({ value, direction, goodDirection = 'up', showIcon = true }) {
  let dir = direction;
  if (!dir) {
    const num = typeof value === 'number' ? value : parseFloat(String(value).replace(/[^0-9.-]/g, ''));
    dir = (isNaN(num) || num === 0) ? 'flat' : (num > 0 ? 'up' : 'down');
  }
  const isGood = dir === 'flat' ? null : dir === goodDirection;
  const palette = isGood === null ? { color: 'var(--n-600)', background: 'var(--n-100)' }
    : isGood ? { color: 'var(--green-600)', background: 'var(--success-bg)' }
    : { color: 'var(--red-700)', background: 'var(--danger-bg)' };
  const iconName = dir === 'up' ? 'trending-up' : dir === 'down' ? 'trending-down' : null;
  const display = typeof value === 'number' ? `${value > 0 ? '+' : ''}${value}` : value;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontFamily: 'var(--font-mono)',
      fontWeight: 'var(--fw-medium)', fontSize: 'var(--text-2xs)', lineHeight: 1, fontVariantNumeric: 'tabular-nums',
      whiteSpace: 'nowrap', padding: '4px 8px', borderRadius: 'var(--radius-pill)', ...palette }}>
      {showIcon && iconName && <Icon name={iconName} size={12} strokeWidth={2.5} />}{display}
    </span>
  );
}

/* ---- DataTable (mirror) ---- */
const ROW_H = { condensed: 'var(--row-condensed)', regular: 'var(--row-regular)', relaxed: 'var(--row-relaxed)' };
function DataTable({ columns, rows, density = 'regular', separators = 'horizontal', stickyHeader = false, defaultSort = null, getRowKey, className = '', style = {}, ...rest }) {
  const [sort, setSort] = useState(defaultSort);
  const sorted = useMemo(() => {
    if (!sort || !sort.key) return rows;
    const col = columns.find((c) => c.key === sort.key);
    const dir = sort.dir === 'asc' ? 1 : -1;
    const val = (row) => { let v = col && col.sortValue ? col.sortValue(row) : row[sort.key]; if (col && col.numeric) v = parseFloat(String(v).replace(/[^0-9.-]/g, '')) || 0; return v; };
    return [...rows].sort((a, b) => { const av = val(a), bv = val(b); if (av < bv) return -dir; if (av > bv) return dir; return 0; });
  }, [rows, sort, columns]);
  function toggleSort(col) {
    if (!col.sortable) return;
    setSort((p) => (!p || p.key !== col.key) ? { key: col.key, dir: 'asc' } : p.dir === 'asc' ? { key: col.key, dir: 'desc' } : null);
  }
  const cls = ['pesty-dt', `pesty-dt--${separators}`, stickyHeader && 'pesty-dt--sticky', className].filter(Boolean).join(' ');
  return (
    <table className={cls} style={{ '--pesty-dt-row': ROW_H[density] || ROW_H.regular, ...style }} {...rest}>
      <thead><tr>
        {columns.map((col) => {
          const active = sort && sort.key === col.key;
          const thCls = [col.numeric && 'num', col.sortable && 'sortable'].filter(Boolean).join(' ');
          return (
            <th key={col.key} className={thCls} style={col.width ? { width: col.width } : undefined}
              onClick={col.sortable ? () => toggleSort(col) : undefined}
              aria-sort={active ? (sort.dir === 'asc' ? 'ascending' : 'descending') : (col.sortable ? 'none' : undefined)}>
              <span className="pesty-dt__sort">{col.label}
                {col.sortable && <Icon name={active && sort.dir === 'asc' ? 'chevron-up' : 'chevron-down'} size={12} strokeWidth={2.5} style={{ opacity: active ? 0.9 : 0.3 }} />}
              </span>
            </th>
          );
        })}
      </tr></thead>
      <tbody>
        {sorted.map((row, i) => (
          <tr key={getRowKey ? getRowKey(row, i) : (row.id != null ? row.id : i)}>
            {columns.map((col) => {
              const tdCls = [col.numeric && 'num', col.strong && 'strong'].filter(Boolean).join(' ');
              const content = col.render ? col.render(row) : row[col.key];
              const sub = col.sub ? col.sub(row) : null;
              return <td key={col.key} className={tdCls} style={col.align && !col.numeric ? { textAlign: col.align } : undefined}>{content}{sub != null && <span className="pesty-dt__sub">{sub}</span>}</td>;
            })}
          </tr>
        ))}
      </tbody>
    </table>
  );
}

/* ---- KpiTile / KpiGrid (mirrors) ---- */
function KpiTile({ label, value, delta, deltaGoodDirection = 'up', icon, accent = false }) {
  return (
    <Card padding="md" style={{ boxShadow: 'var(--shadow-sm)' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '12px' }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-2xs)', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--n-600)', fontWeight: 'var(--fw-medium)', lineHeight: 1.3 }}>{label}</span>
        {icon && <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 30, height: 30, borderRadius: 'var(--radius-sm)', flexShrink: 0, background: 'var(--brand-subtle)', color: 'var(--brand)' }}><Icon name={icon} size={16} /></span>}
      </div>
      <div style={{ marginTop: '12px', display: 'flex', alignItems: 'baseline', gap: '10px', flexWrap: 'wrap' }}>
        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 'var(--fw-extrabold)', fontSize: 'var(--text-kpi)', lineHeight: 1, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums', color: accent ? 'var(--brand)' : 'var(--ink-900)' }}>{value}</span>
        {delta != null && ((typeof delta === 'string' || typeof delta === 'number') ? <DeltaPill value={delta} goodDirection={deltaGoodDirection} /> : delta)}
      </div>
    </Card>
  );
}
function KpiGrid({ children, min = 220, gap = 'var(--space-4)', style = {} }) {
  const minStr = typeof min === 'number' ? `${min}px` : min;
  return <div style={{ display: 'grid', gap, gridTemplateColumns: `repeat(auto-fit, minmax(${minStr}, 1fr))`, ...style }}>{children}</div>;
}

/* ---- Tabs / Chip / SectionHeader (mirrors) ---- */
function Tabs({ tabs, value, defaultValue, onChange }) {
  const [internal, setInternal] = useState(defaultValue != null ? defaultValue : (tabs[0] && tabs[0].id));
  const active = value != null ? value : internal;
  const select = (id) => { if (value == null) setInternal(id); if (onChange) onChange(id); };
  return (
    <div role="tablist" className="pesty-tabs">
      {tabs.map((t) => (
        <button key={t.id} type="button" role="tab" aria-selected={active === t.id} className="pesty-tab" onClick={() => select(t.id)}>
          {t.icon && <Icon name={t.icon} size={16} />}{t.label}{t.count != null && <span className="pesty-tab__count">{t.count}</span>}
        </button>
      ))}
    </div>
  );
}
function Chip({ children, selected = false, removable = false, onRemove, icon, ...rest }) {
  return (
    <button type="button" className="pesty-chip" aria-pressed={selected} {...rest}>
      {icon && <Icon name={icon} size={14} />}{children}
      {removable && <span className="pesty-chip__x" role="button" aria-label="Remove" onClick={(e) => { e.stopPropagation(); if (onRemove) onRemove(e); }}><Icon name="x" size={14} /></span>}
    </button>
  );
}
function SectionHeader({ title, subtitle, actions, style = {} }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 'var(--space-4)', borderLeft: '3px solid var(--brand)', paddingLeft: 'var(--space-4)', margin: '0 0 var(--space-5)', ...style }}>
      <div>
        <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 'var(--fw-bold)', fontSize: 'var(--text-lg)', lineHeight: 1.2, letterSpacing: '-0.01em', color: 'var(--text-strong)', margin: 0 }}>{title}</h2>
        {subtitle && <p style={{ fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)', color: 'var(--text-muted)', margin: '4px 0 0', lineHeight: 1.4 }}>{subtitle}</p>}
      </div>
      {actions && <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-2)', flexShrink: 0 }}>{actions}</div>}
    </div>
  );
}

/* ---- CodeBlock / SpecList / Pipeline (mirrors — docs & reference patterns) ---- */
function CodeBlock({ children, label, copyText, className = '', ...rest }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const text = copyText != null ? copyText : (typeof children === 'string' ? children : '');
    if (!text || !navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1600); });
  };
  return (
    <div className={`pesty-code ${className}`} {...rest}>
      {label && <div className="pesty-code__label">{label}</div>}
      <div className="pesty-code__panel">
        {copyText != null && <button type="button" className="pesty-code__copy" onClick={copy} aria-label="Copy code">{copied ? 'Copied' : 'Copy'}</button>}
        <pre className="pesty-code__pre">{children}</pre>
      </div>
    </div>
  );
}
function SpecList({ items = [], min = 260, className = '', style = {}, ...rest }) {
  const minStr = typeof min === 'number' ? `${min}px` : min;
  return (
    <dl className={`pesty-spec ${className}`} style={{ '--pesty-spec-min': minStr, ...style }} {...rest}>
      {items.map((it, i) => (
        <div className="pesty-spec__row" key={it.key != null ? String(it.key) : i}>
          <dt className="pesty-spec__key">{it.key}</dt>
          <dd className="pesty-spec__val">{it.value}</dd>
        </div>
      ))}
    </dl>
  );
}
function Pipeline({ steps = [], className = '', ...rest }) {
  return (
    <div className={`pesty-pipeline ${className}`} {...rest}>
      {steps.map((s, i) => (
        <React.Fragment key={i}>
          <span className="pesty-pipeline__step">{typeof s === 'string' ? s : s.label}</span>
          {i < steps.length - 1 && <span className="pesty-pipeline__arrow"><Icon name="arrow-right" size={16} /></span>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ---- Shell (mirrors) ---- */
function Sidebar({ items = [], header, footer, activeId, onSelect }) {
  const select = (id) => () => { if (onSelect) onSelect(id); };
  return (
    <aside className="pesty-sidebar">
      {header && <div className="pesty-sidebar__head">{header}</div>}
      <nav className="pesty-sidebar__nav">
        {items.map((it, i) => {
          if (it.groupLabel) return <div key={`g-${i}`} className="pesty-sidebar__group">{it.groupLabel}</div>;
          const kids = it.children || [];
          return (
            <React.Fragment key={it.id}>
              <button type="button" className="pesty-navitem" aria-current={activeId === it.id ? 'page' : undefined} onClick={select(it.id)}>
                {it.icon && <Icon name={it.icon} size={18} />}{it.label}{it.count != null && <span className="pesty-navitem__count">{it.count}</span>}
              </button>
              {kids.length > 0 && <div className="pesty-subnav">{kids.map((c) => <button key={c.id} type="button" className="pesty-navitem pesty-navitem--sub" aria-current={activeId === c.id ? 'page' : undefined} onClick={select(c.id)}>{c.label}</button>)}</div>}
            </React.Fragment>
          );
        })}
      </nav>
      {footer && <div className="pesty-sidebar__foot">{footer}</div>}
    </aside>
  );
}
function Topbar({ title, left, search, actions }) {
  return (
    <header style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-4)', height: 'var(--topbar-h)', padding: '0 var(--dash-gutter)', background: 'var(--surface)', borderBottom: '1px solid var(--border)', position: 'sticky', top: 0, zIndex: 10, boxSizing: 'border-box' }}>
      {left}
      {title && <div style={{ fontFamily: 'var(--font-display)', fontWeight: 'var(--fw-bold)', fontSize: 'var(--text-md)', color: 'var(--text-strong)', whiteSpace: 'nowrap' }}>{title}</div>}
      {search && <div style={{ flex: 1, maxWidth: 380 }}>{search}</div>}
      {actions && <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 'var(--space-3)' }}>{actions}</div>}
    </header>
  );
}
function DashboardShell({ sidebar, topbar, children, fullBleed = false, contentMaxWidth = 'var(--container-dashboard)' }) {
  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg-subtle)' }}>
      {sidebar}
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minWidth: 0 }}>
        {topbar}
        <main style={{ flex: 1, padding: 'var(--dash-gutter)' }}>
          <div style={{ width: '100%', maxWidth: fullBleed ? 'none' : contentMaxWidth, margin: fullBleed ? 0 : '0 auto' }}>{children}</div>
        </main>
      </div>
    </div>
  );
}

  { key: "name", label: "Client", strong: true, sortable: true, sub: (r) => r.city },

  { key: "status", label: "Status", render: (r) => <StatusPill variant={r.sv}>{r.status}</StatusPill> },
];

const NAV = [
  { id: "overview", label: "Overview", icon: "home" },
  { id: "clients", label: "Clients", icon: "users", count: 128 },
  { groupLabel: "Reporting" },
  { id: "seo", label: "SEO", icon: "bar-chart", children: [{ id: "seo-rank", label: "Rankings" }, { id: "seo-traffic", label: "Traffic" }] },
  { id: "paid", label: "Paid Search", icon: "target" },
  { id: "reviews", label: "Reviews", icon: "star" },
];

function App() {
  const [view, setView] = useState("clients");
  const [tab, setTab] = useState("all");
  const [sep, setSep] = useState("horizontal");
  const [density, setDensity] = useState("regular");

  const filtered = useMemo(() => {
    if (tab === "all") return CLIENTS;
    if (tab === "seo") return CLIENTS.filter((c) => c.channel.includes("SEO"));
    if (tab === "paid") return CLIENTS.filter((c) => c.channel.includes("Paid") || c.channel === "LSA");
    if (tab === "risk") return CLIENTS.filter((c) => c.sv === "warning" || c.sv === "danger");
    return CLIENTS;
  }, [tab]);

  return (
    <>
      <DashboardShell
        fullBleed
        sidebar={<Sidebar items={NAV} activeId={view} onSelect={setView}
          header={<img src="../../assets/brand/pesty-logo-white.svg" alt="Pesty" height={22} />}
          footer={<><Avatar name="Andrew E" size={30} /><span style={{ fontSize: 'var(--text-sm)', color: 'var(--text-on-dark-muted)' }}>Andrew E.</span></>} />}
        topbar={<Topbar title="Client portfolio"
          search={<Input icon="search" placeholder="Search clients…" />}
          actions={<><Button variant="outline" size="sm" iconLeft="filter">Filters</Button><Icon name="bell" size={20} style={{ color: 'var(--text-muted)' }} /><Avatar name="Andrew E" size={36} /></>} />}
      >
        <KpiGrid style={{ marginBottom: 'var(--space-6)' }}>
          <KpiTile label="Active clients" value="1,284" delta="+12%" icon="users" />
          <KpiTile label="Blended CPL" value="$24.24" delta="-8%" deltaGoodDirection="down" icon="zap" />
          <KpiTile label="MRR" value="$182K" delta="+4%" icon="trending-up" accent />
          <KpiTile label="Win rate" value="92%" delta="+3%" icon="target" />
        </KpiGrid>

        <SectionHeader title="Client portfolio" subtitle={`${filtered.length} accounts`}
          actions={<>
            <Chip selected={density === 'condensed'} onClick={() => setDensity(density === 'condensed' ? 'regular' : 'condensed')}>Condensed</Chip>
            {['horizontal', 'zebra', 'grid', 'freeform'].map((s) => <Chip key={s} selected={sep === s} onClick={() => setSep(s)}>{s}</Chip>)}
          </>} />

        <div style={{ marginBottom: 'var(--space-4)' }}>
          <Tabs value={tab} onChange={setTab} tabs={[
            { id: "all", label: "All", count: 9 },
            { id: "seo", label: "SEO", icon: "bar-chart" },
            { id: "paid", label: "Paid" },
            { id: "risk", label: "At risk", count: 3 },
          ]} />

        <Card padding="none" style={{ overflow: 'hidden' }}>
          <DataTable columns={COLUMNS} rows={filtered} separators={sep} density={density} stickyHeader defaultSort={{ key: "mrr", dir: "desc" }} />
        </Card>
      </DashboardShell>

      {/* Isolated component specimens */}
      <section className="specimens">
        <span className="ey">Dashboard UI kit</span>
        <h3>Components</h3>
        <div className="spec-grid">
          <div className="spec"><span className="lbl">Status pills</span><div className="row">
            <StatusPill variant="success">Active</StatusPill><StatusPill variant="warning">At risk</StatusPill>
            <StatusPill variant="danger">Churned</StatusPill><StatusPill variant="info">Onboarding</StatusPill>
            <StatusPill variant="neutral" dot={false}>Draft</StatusPill>
          </div></div>
          <div className="spec"><span className="lbl">Delta pills</span><div className="row">
            <DeltaPill value="+12%" /><DeltaPill value="-5%" /><DeltaPill value="-8%" goodDirection="down" /><DeltaPill value={0} />
          </div></div>
          <div className="spec"><span className="lbl">Chips</span><div className="row">
            <Chip selected>All</Chip><Chip icon="filter">SEO</Chip><Chip removable>Atlanta, GA</Chip>
          </div></div>
          <div className="spec"><span className="lbl">KPI tile</span><div style={{ maxWidth: 280 }}>
            <KpiTile label="Cost per lead" value="$24.24" delta="-8%" deltaGoodDirection="down" icon="zap" />
          </div></div>
          <div className="spec"><span className="lbl">Pipeline</span>

              { key: 'Auth', value: <><code>X-API-Key</code> header</> },
              { key: 'Hosting', value: 'Fly.io (iad)' },

          <div className="spec"><span className="lbl">Code block</span>

              <span className="c"># interactive docs at /docs</span>{'\n'}
              curl -H <span className="s">"X-API-Key: &lt;key&gt;"</span> <span className="s">"https://api.example.com/companies?state=TX"</span>
            </CodeBlock>
          </div>
        </div>
      </section>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
