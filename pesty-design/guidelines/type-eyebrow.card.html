<!-- @dsCard group="Type" viewport="700x160" name="Eyebrow & Data" subtitle="Uppercase eyebrows + JetBrains Mono for metrics" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px 28px; font-family: var(--font-body); display:flex; gap: 40px; align-items:center; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .mono { font-family: var(--font-mono); }
  .stat { font-family: var(--font-display); font-weight:800; font-size:42px; color:var(--ink-900); line-height:1; letter-spacing:-0.02em; }
  .stat b { color: var(--red-500); }
  .cap { font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="col">
    <span class="eyebrow">Masters of pest control</span>
    <span class="mono" style="font-size:13px;color:var(--text-muted)">font-mono · labels &amp; code</span>
  </div>
  <div class="col" style="margin-left:auto;text-align:right;align-items:flex-end">
    <span class="stat"><b>$100K</b></span>
    <span class="cap">monthly ad spend saved</span>
  </div>
</body>
</html>
