<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 0; font-family: var(--font-body); display: grid; grid-template-columns: 1fr 1fr; }
  .panel { display: flex; align-items: center; justify-content: center; height: 200px; }
  .light { background: var(--n-0); border-right: 1px solid var(--border); }
  .dark { background: var(--ink-900); }
  img { width: 210px; height: auto; }
</style>
</head>
<body>
  <div class="panel light"><img src="../assets/brand/pesty-logo.svg" alt="Pesty logo on light"></div>
  <div class="panel dark"><img src="../assets/brand/pesty-logo-white.svg" alt="Pesty logo on dark"></div>
</body>
</html>
