<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Modular scale from 12 → 60px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 22px 28px; font-family: var(--font-body); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--divider); }
  .row:last-child { border-bottom: 0; }
  .t { font-family: var(--font-display); color: var(--text-strong); font-weight: 700; line-height: 1.1; letter-spacing: var(--tracking-tight); white-space: nowrap; }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="t" style="font-size:var(--text-5xl)">Aa</span><span class="tag">5xl · 60 / hero</span></div>
  <div class="row"><span class="t" style="font-size:var(--text-4xl)">Conquer the market</span><span class="tag">4xl · 48 / h1</span></div>
  <div class="row"><span class="t" style="font-size:var(--text-3xl)">Section heading</span><span class="tag">3xl · 36 / h2</span></div>
  <div class="row"><span class="t" style="font-size:var(--text-2xl)">Card title goes here</span><span class="tag">2xl · 30 / h3</span></div>
  <div class="row"><span class="t" style="font-size:var(--text-xl)">Smaller subheading label</span><span class="tag">xl · 24 / h4</span></div>
  <div class="row"><span class="t" style="font-size:var(--text-base); font-weight:400; font-family:var(--font-body); color:var(--text-body)">Body copy at sixteen pixels for comfortable reading</span><span class="tag">base · 16</span></div>
</body>
</html>
