<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid — 1 → 32" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px 28px; font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--red-500); border-radius: 3px; width: 100%; }
  .box { display:flex; align-items:flex-end; height: 80px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px;width:18px"></div></div><span class="lab">1·4</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px;width:18px"></div></div><span class="lab">2·8</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px;width:18px"></div></div><span class="lab">3·12</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px;width:18px"></div></div><span class="lab">4·16</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px;width:18px"></div></div><span class="lab">6·24</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px;width:18px"></div></div><span class="lab">8·32</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:48px;width:18px"></div></div><span class="lab">12·48</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:64px;width:18px"></div></div><span class="lab">16·64</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:80px;width:18px"></div></div><span class="lab">20·80</span></div>
  </div>
</body>
</html>
