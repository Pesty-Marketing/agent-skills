<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Cool, faintly teal-tinted grays for text, borders & surfaces" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-body); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .cell { height: 76px; }
  .cell.b { box-shadow: inset 0 0 0 1px var(--border); }
  .labels { display: grid; grid-template-columns: repeat(11, 1fr); margin-top: 8px; }
  .labels span { text-align: center; font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="scale">
    <div class="cell b" style="background:var(--n-0)"></div>
    <div class="cell" style="background:var(--n-25)"></div>
    <div class="cell" style="background:var(--n-50)"></div>
    <div class="cell" style="background:var(--n-100)"></div>
    <div class="cell" style="background:var(--n-200)"></div>
    <div class="cell" style="background:var(--n-300)"></div>
    <div class="cell" style="background:var(--n-400)"></div>
    <div class="cell" style="background:var(--n-500)"></div>
    <div class="cell" style="background:var(--n-600)"></div>
    <div class="cell" style="background:var(--n-700)"></div>
    <div class="cell" style="background:var(--n-900)"></div>
  </div>
  <div class="labels">
    <span>0</span><span>25</span><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>900</span>
  </div>
</body>
</html>
