<!-- @dsCard group="Components" viewport="700x300" name="Buttons" subtitle="Primary, secondary, outline, ghost & light — 3 sizes, with icons" -->
<!--
  Self-contained specimen: INLINES the components below (no dependency on the
  upstream _ds_bundle.js), so it renders in every context. The inlined
  definitions mirror the canonical sources under ../../components/{buttons,core}/
  — edit those for the library; this card is a runnable specimen.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 28px; font-family: var(--font-body); }
  .grid { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .row.dark { background: var(--ink-900); padding: 16px 18px; border-radius: var(--radius-lg); }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 64px; flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    /* ---- Icon (mirror of components/core/Icon.jsx) ---- */
    const PATHS = {
      'arrow-right': <><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></>,
      'arrow-up-right': <><path d="M7 7h10v10" /><path d="M7 17 17 7" /></>,
      check: <path d="M20 6 9 17l-5-5" />,
      phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
      'chevron-right': <path d="m9 18 6-6-6-6" />,
      'chevron-down': <path d="m6 9 6 6 6-6" />,
    };
    function Icon({ name, size = 20, strokeWidth = 2, className, style, ...rest }) {
      const filled = name === 'star';
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
          fill={filled ? 'currentColor' : 'none'} stroke={filled ? 'none' : 'currentColor'}
          strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
          className={className} style={{ display: 'block', flexShrink: 0, ...style }} aria-hidden="true" {...rest}>
          {PATHS[name] || null}
        </svg>
      );
    }

    /* ---- Button (mirror of components/buttons/Button.jsx) ---- */
    const BTN_CSS = `
    .pesty-btn {
      --_bg: var(--brand); --_fg: var(--text-on-brand); --_bd: transparent;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5em;
      font-family: var(--font-display); font-weight: var(--fw-semibold);
      border: 1.5px solid var(--_bd); background: var(--_bg); color: var(--_fg);
      border-radius: var(--radius-pill); cursor: pointer; text-decoration: none;
      white-space: nowrap; line-height: 1; letter-spacing: -0.01em;
      transition: background var(--dur-base) var(--ease-standard), color var(--dur-base) var(--ease-standard), border-color var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard), transform var(--dur-fast) var(--ease-standard);
    }
    .pesty-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
    .pesty-btn:active { transform: translateY(1px); }
    .pesty-btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none; }
    .pesty-btn--sm { font-size: var(--text-sm); padding: 8px 16px; }
    .pesty-btn--md { font-size: var(--text-base); padding: 12px 22px; }
    .pesty-btn--lg { font-size: var(--text-md); padding: 16px 30px; }
    .pesty-btn--full { width: 100%; }
    .pesty-btn--primary { --_bg: var(--brand); --_fg: #fff; }
    .pesty-btn--primary:hover:not([disabled]) { --_bg: var(--brand-hover); box-shadow: var(--shadow-brand); }
    .pesty-btn--secondary { --_bg: var(--ink-900); --_fg: #fff; }
    .pesty-btn--secondary:hover:not([disabled]) { --_bg: var(--ink-800); box-shadow: var(--shadow-md); }
    .pesty-btn--outline { --_bg: transparent; --_fg: var(--ink-900); --_bd: var(--border-strong); }
    .pesty-btn--outline:hover:not([disabled]) { --_bd: var(--ink-900); --_bg: var(--n-50); }
    .pesty-btn--ghost { --_bg: transparent; --_fg: var(--brand); --_bd: transparent; }
    .pesty-btn--ghost:hover:not([disabled]) { --_bg: var(--brand-subtle); }
    .pesty-btn--light { --_bg: #fff; --_fg: var(--ink-900); }
    .pesty-btn--light:hover:not([disabled]) { --_bg: var(--n-100); }
    `;
    if (typeof document !== 'undefined' && !document.getElementById('pesty-btn-css')) {
      const s = document.createElement('style'); s.id = 'pesty-btn-css'; s.textContent = BTN_CSS; document.head.appendChild(s);
    }
    function Button({ children, variant = 'primary', size = 'md', iconLeft, iconRight, full = false, as = 'button', className = '', ...rest }) {
      const Tag = as;
      const cls = ['pesty-btn', `pesty-btn--${variant}`, `pesty-btn--${size}`, full ? 'pesty-btn--full' : '', className].filter(Boolean).join(' ');
      const iconSize = size === 'lg' ? 20 : size === 'sm' ? 16 : 18;
      return (
        <Tag className={cls} {...rest}>
          {iconLeft && <Icon name={iconLeft} size={iconSize} />}
          {children}
          {iconRight && <Icon name={iconRight} size={iconSize} />}
        </Tag>
      );
    }

    /* ---- Demo ---- */
    function Demo() {
      return (
        <div className="grid">
          <div className="row">
            <span className="lbl">variants</span>
            <Button variant="primary" iconRight="arrow-right">Get a free audit</Button>
            <Button variant="secondary" iconLeft="phone">Book a call</Button>
            <Button variant="outline">Learn about SEO</Button>
            <Button variant="ghost" iconRight="chevron-right">Read more</Button>
          </div>
          <div className="row">
            <span className="lbl">sizes</span>
            <Button size="sm" variant="primary">Small</Button>
            <Button size="md" variant="primary">Medium</Button>
            <Button size="lg" variant="primary" iconRight="arrow-right">Large</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row dark">
            <span className="lbl" style={{color:'rgba(255,255,255,.6)'}}>on dark</span>
            <Button variant="primary" iconRight="arrow-right">Dominate your market</Button>
            <Button variant="light">See case studies</Button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
