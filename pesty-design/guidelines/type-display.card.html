<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 26px 28px; font-family: var(--font-body); }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .d { font-family: var(--font-display); color: var(--text-strong); line-height: 1.04; letter-spacing: var(--tracking-tighter); margin: 0; }
  .h2 { font-family: var(--font-display); color: var(--text-strong); font-weight: 700; font-size: var(--text-3xl); letter-spacing: var(--tracking-tight); margin: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="stack">
    <p class="d" style="font-size: var(--text-5xl); font-weight: 800;">Dominate your market.</p>
    <p class="h2">Battle-tested pest control marketing</p>
    <p class="meta">Poppins · 800 display / 700 headings · tracking −0.03 to −0.015em · line-height 1.04–1.2</p>
  </div>
</body>
</html>
