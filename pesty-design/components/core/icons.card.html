<!-- @dsCard group="Components" viewport="700x180" name="Icons" subtitle="Curated Lucide-based set — 24px grid, 2px stroke, currentColor" -->
<!--
  Self-contained specimen: INLINES the Icon component below (no dependency on
  the upstream _ds_bundle.js), so it renders in every context. The inlined
  definition mirrors the canonical source at ../../components/core/Icon.jsx —
  edit that for the library; this card is a runnable specimen.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 26px 28px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--ink-900); }
  .cell span { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .ic { display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius: var(--radius-md); background: var(--n-50); border: 1px solid var(--border); }
  .ic.red { color: var(--brand); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    /* ---- Icon (mirror of components/core/Icon.jsx) ---- */
    const PATHS = {
      'arrow-right': <><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></>,
      'arrow-up-right': <><path d="M7 7h10v10" /><path d="M7 17 17 7" /></>,
      check: <path d="M20 6 9 17l-5-5" />,
      phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
      search: <><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>,
      menu: <><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></>,
      x: <><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>,
      star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
      'chevron-right': <path d="m9 18 6-6-6-6" />,
      'chevron-down': <path d="m6 9 6 6 6-6" />,
      'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
      'trending-up': <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></>,
      'shield-check': <><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" /><path d="m9 12 2 2 4-4" /></>,
      target: <><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>,
      zap: <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" />,
    };
    function Icon({ name, size = 20, strokeWidth = 2, className, style, ...rest }) {
      const filled = name === 'star';
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
          fill={filled ? 'currentColor' : 'none'} stroke={filled ? 'none' : 'currentColor'}
          strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
          className={className} style={{ display: 'block', flexShrink: 0, ...style }} aria-hidden="true" {...rest}>
          {PATHS[name] || null}
        </svg>
      );
    }

    /* ---- Demo ---- */
    const names = ['arrow-right','arrow-up-right','check','phone','search','menu','x','star','chevron-right','chevron-down','map-pin','trending-up','shield-check','target','zap'];
    function Demo() {
      return (
        <div className="grid">
          {names.map((n,i) => (
            <div className="cell" key={n}>
              <div className={'ic' + (i % 3 === 0 ? ' red' : '')}><Icon name={n} size={22} /></div>
              <span>{n}</span>
            </div>
          ))}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
